name: Serenity Report
run-name: Serenity ${{ github.event.client_payload.job_id || 'manual' }}

# Genera el reporte Serenity a partir de un bundle JSON completo (con evidencias
# base64 embebidas) subido a Supabase Storage. La Vercel function /api/serenity-report
# genera una URL firmada y la envia como client_payload.bundle_url.
#
# Disparadores:
#  1) workflow_dispatch (manual): usa ci/bundle.json o una URL (bundle_url).
#  2) repository_dispatch (type=serenity-report): descarga el bundle desde
#     client_payload.bundle_url (URL firmada de Supabase Storage).

on:
  workflow_dispatch:
    inputs:
      bundle_url:
        description: "URL del bundle JSON (opcional; si se omite usa ci/bundle.json)"
        required: false
        default: ""
  repository_dispatch:
    types: [serenity-report]

permissions:
  contents: read

jobs:
  build-report:
    runs-on: ubuntu-latest
    env:
      BUNDLE_URL: ${{ github.event.inputs.bundle_url || github.event.client_payload.bundle_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ runner.os }}-${{ hashFiles('**/*.gradle', 'gradle/wrapper/gradle-wrapper.properties') }}
          restore-keys: gradle-${{ runner.os }}-

      - name: Download bundle (Supabase signed URL)
        run: |
          set -e
          if [ -n "$BUNDLE_URL" ]; then
            echo "Descargando bundle metadata desde Supabase..."
            curl -fsSL "$BUNDLE_URL" -o bundle.json
          elif [ -f ci/bundle.json ]; then
            echo "Usando ci/bundle.json del repositorio"
            cp ci/bundle.json bundle.json
          else
            echo "ERROR: no se proporciono bundle"; exit 1
          fi
          echo "Bundle metadata: $(wc -c < bundle.json) bytes"

      - name: Download evidence from Supabase
        if: env.SUPABASE_URL != ''
        env:
          SUPABASE_URL: ${{ github.event.client_payload.supabase_url }}
          SUPABASE_SERVICE_KEY: ${{ github.event.client_payload.supabase_service_key }}
          EVIDENCE_BUCKET: ${{ github.event.client_payload.evidence_bucket }}
        run: node ci/download-evidence.js bundle.json evidences

      - name: Materialize (feature + evidencias + resultados)
        run: node ci/materialize.js bundle.json

      - name: Generate Serenity report
        id: gen
        continue-on-error: true
        run: |
          chmod +x ./gradlew
          ./gradlew clean test aggregate \
            -Dmanual.headless=true \
            -Dmanual.results.file="$PWD/webapp/data/manual-results.tsv" \
            -Dmanual.evidences.dir="$PWD/evidences" \
            --console=plain --no-daemon --stacktrace

      - name: Check report
        run: |
          if [ -f target/site/serenity/index.html ]; then
            echo "REPORT_OK=1" >> "$GITHUB_ENV"
            echo "Reporte Serenity generado correctamente."
          else
            echo "REPORT_OK=0" >> "$GITHUB_ENV"
            echo "No se genero el reporte Serenity."
          fi

      - name: Upload target as artifact (target.zip)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: target
          path: target
          retention-days: 7
          if-no-files-found: warn

      - name: Fail if report missing
        if: always() && env.REPORT_OK != '1'
        run: |
          echo "El reporte Serenity no se genero."
          exit 1
